name: iOS TestFlight

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ios-testflight-${{ github.ref }}
  cancel-in-progress: true

env:
  APP_STORE_CONNECT_API_KEY_PATH: /tmp/AuthKey.p8
  NO_FLIPPER: "1"

jobs:
  deploy:
    runs-on: macos-latest
    defaults:
      run:
        working-directory: mobile

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - name: Install npm dependencies
        run: npm ci

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true
          working-directory: mobile

      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Cache CocoaPods
        uses: actions/cache@v4
        with:
          path: mobile/ios/Pods
          key: pods-${{ runner.os }}-${{ hashFiles('mobile/ios/Podfile.lock', 'mobile/ios/Podfile') }}
          restore-keys: |
            pods-${{ runner.os }}-

      - name: Cache Swift Package Manager
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Caches/org.swift.swiftpm
            ~/Library/Developer/Xcode/DerivedData/**/SourcePackages
          key: spm-${{ runner.os }}-${{ hashFiles('mobile/ios/**/Package.resolved') }}
          restore-keys: |
            spm-${{ runner.os }}-

      - name: Install CocoaPods dependencies
        working-directory: mobile/ios
        run: bundle exec pod install --repo-update

      - name: Configure SSH for match certs repo
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.MATCH_GIT_PRIVATE_KEY }}

      - name: Add GitHub to SSH known hosts
        run: ssh-keyscan github.com >> ~/.ssh/known_hosts

      - name: Write App Store Connect API key
        run: |
          printf '%s' "$APP_STORE_CONNECT_API_KEY" > "$APP_STORE_CONNECT_API_KEY_PATH"
          chmod 600 "$APP_STORE_CONNECT_API_KEY_PATH"
        env:
          APP_STORE_CONNECT_API_KEY: ${{ secrets.APP_STORE_CONNECT_API_KEY }}

      - name: Build and upload to TestFlight
        working-directory: mobile/ios
        env:
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
        run: bundle exec fastlane ios beta

      - name: Remove API key file
        if: always()
        run: rm -f "$APP_STORE_CONNECT_API_KEY_PATH"
