<body class="bg-background font-body-md text-on-background min-h-screen flex flex-col">
<!-- TopAppBar -->
<header class="bg-white dark:bg-slate-900 shadow-[0px_4px_12px_rgba(26,43,60,0.05)] border-b border-slate-200 dark:border-slate-800 flex items-center justify-between px-4 h-16 w-full sticky top-0 z-50">
<div class="flex items-center gap-4">
<button class="active:opacity-70 transition-opacity p-2 -ml-2 hover:bg-slate-50 dark:hover:bg-slate-800 transition-colors rounded-full">
<span class="material-symbols-outlined text-[#1A2B3C] dark:text-slate-100">arrow_back</span>
</button>
<h1 class="font-['Inter'] font-semibold text-lg text-[#1A2B3C] dark:text-slate-100">Registration</h1>
</div>
<div class="text-xl font-black text-[#1A2B3C] dark:text-white tracking-tight">FreightFlex</div>
</header>
<!-- Main Content Canvas -->
<main class="flex-grow flex flex-col items-center justify-center px-gutter py-lg max-w-md mx-auto w-full">
<!-- Error Illustration Module -->
<div class="relative mb-lg">
<div class="w-32 h-32 rounded-full bg-secondary-container/20 flex items-center justify-center relative">
<div class="w-24 h-24 rounded-full bg-secondary-container flex items-center justify-center shadow-lg">
<span class="material-symbols-outlined text-on-secondary-container text-5xl" style="font-variation-settings: 'FILL' 1;">lock</span>
</div>
<!-- Warning Badge -->
<div class="absolute -top-1 -right-1 bg-error w-10 h-10 rounded-full border-4 border-background flex items-center justify-center">
<span class="material-symbols-outlined text-white text-xl">priority_high</span>
</div>
</div>
<!-- Decorative Accent -->
<div class="absolute -z-10 top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-48 h-48 bg-secondary/5 blur-3xl rounded-full"></div>
</div>
<!-- Feedback Section -->
<section class="text-center mb-lg w-full">
<h2 class="font-h1 text-h1 text-primary mb-sm">Email Already in Use</h2>
<p class="font-body-md text-on-surface-variant max-w-[280px] mx-auto">
                The email you entered is already associated with a FreightFlex account.
            </p>
</section>
<!-- Form/Action Card -->
<div class="w-full bg-surface-container-lowest rounded-xl p-6 shadow-[0px_4px_12px_rgba(26,43,60,0.05)] border border-surface-container-highest">
<div class="flex flex-col gap-4">
<!-- Primary Action -->
<button class="w-full h-14 bg-secondary-container hover:bg-secondary-container/90 text-on-secondary-container font-label-bold text-body-md rounded-lg flex items-center justify-center gap-2 transition-all active:scale-95">
<span class="material-symbols-outlined text-xl">login</span>

                </button>

<div class="flex flex-col gap-base mt-2">
<button class="w-full h-12 text-primary font-label-bold text-body-sm hover:bg-surface-container rounded-lg transition-colors flex items-center justify-center gap-2">
<span class="material-symbols-outlined text-lg">lock_reset</span>
                        Reset Password
                    </button>
<div class="flex items-center justify-center gap-4 my-2">
<hr class="flex-grow border-surface-container-highest"/>
<span class="text-outline text-[10px] uppercase tracking-widest font-bold">or</span>
<hr class="flex-grow border-surface-container-highest"/>
</div>
<button class="w-full h-12 text-on-surface-variant font-label-bold text-body-sm hover:bg-surface-container-low border border-outline-variant rounded-lg transition-colors flex items-center justify-center gap-2">
<span class="material-symbols-outlined text-lg">edit</span>
                        Go Back &amp; Change Email
                    </button>
</div>
</div>
</div>

<p class="mt-lg text-center font-body-sm text-on-surface-variant">
