<input aria-label="Digit 6" class="otp-input w-12 h-14 md:w-14 md:h-16 text-center text-h2 font-h2 border-2 border-outline-variant rounded-lg bg-surface-bright focus:border-primary transition-all" maxlength="1" type="text"/>
