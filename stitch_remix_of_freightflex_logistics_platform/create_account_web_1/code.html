<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Create Account | LogisticsPro</title>

                        "on-secondary-container": "#713b00",
                        "surface-variant": "#e1e3e4",
                        "inverse-primary": "#b7c8de",
                        "error": "#ba1a1a",
                        "on-tertiary-fixed-variant": "#584326",
                        "tertiary-fixed": "#feddb5",
                        "on-surface-variant": "#44474c",

<style>
        body { font-family: 'Inter', sans-serif; }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
</head>
<body class="bg-background text-on-background min-h-screen flex flex-col">
<header class="bg-[#f8f9fa] dark:bg-[#191c1d] border-b border-[#c4c6cd] dark:border-[#44474c] shadow-sm docked full-width top-0 z-50 flex justify-between items-center px-8 h-16 w-full">
<div class="text-2xl font-bold tracking-tight text-[#041627] dark:text-[#ffffff]">LogisticsPro</div>
<div class="hidden md:flex gap-8 items-center font-['Inter'] text-sm font-medium">
<a class="text-[#44474c] dark:text-[#c4c6cd] hover:text-[#904d00] transition-colors duration-200" href="#">Solutions</a>
<a class="text-[#44474c] dark:text-[#c4c6cd] hover:text-[#904d00] transition-colors duration-200" href="#">Fleet</a>
<a class="text-[#44474c] dark:text-[#c4c6cd] hover:text-[#904d00] transition-colors duration-200" href="#">Pricing</a>
<a class="text-[#44474c] dark:text-[#c4c6cd] hover:text-[#904d00] transition-colors duration-200" href="#">Support</a>
</div>
<button class="bg-primary text-on-primary px-6 py-2 rounded-lg font-medium active:scale-95 transition-transform">Login</button>
</header>
<main class="flex-grow flex items-center justify-center p-6 md:p-12 relative overflow-hidden">
<div class="absolute inset-0 z-0 opacity-10">
<div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] bg-secondary rounded-full blur-[120px]"></div>
<div class="absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] bg-primary rounded-full blur-[120px]"></div>
</div>
<div class="w-full max-w-xl bg-surface-container-lowest rounded-xl shadow-[0px_4px_12px_rgba(26,43,60,0.05)] z-10 overflow-hidden border border-outline-variant/30">
<div class="p-8 md:p-10">
<div class="mb-10">
<h1 class="text-3xl font-bold text-primary tracking-tight mb-2">Create Account</h1>
<p class="text-on-surface-variant body-md">Start managing your logistics pipeline today.</p>
</div>
<form class="space-y-8">
<div class="space-y-3">
<label class="text-xs font-bold text-on-surface uppercase tracking-wider">Select Your Role</label>
<div class="grid grid-cols-3 gap-4">
<label class="relative group cursor-pointer">
<input checked="" class="peer sr-only" name="role" type="radio"/>
<div class="flex flex-col items-center justify-center p-4 rounded-lg border-2 border-outline-variant bg-surface-container-low transition-all peer-checked:border-secondary peer-checked:bg-secondary-fixed/20 group-hover:bg-surface-container">
<span class="material-symbols-outlined text-primary mb-2" data-icon="local_shipping">local_shipping</span>
<span class="text-xs font-bold text-primary">Driver</span>
</div>
</label>
<label class="relative group cursor-pointer">
<input class="peer sr-only" name="role" type="radio"/>
<div class="flex flex-col items-center justify-center p-4 rounded-lg border-2 border-outline-variant bg-surface-container-low transition-all peer-checked:border-secondary peer-checked:bg-secondary-fixed/20 group-hover:bg-surface-container">
<span class="material-symbols-outlined text-primary mb-2" data-icon="conveyor_belt">conveyor_belt</span>
<span class="text-xs font-bold text-primary">Haulier</span>
</div>
</label>
<label class="relative group cursor-pointer">
<input class="peer sr-only" name="role" type="radio"/>
<div class="flex flex-col items-center justify-center p-4 rounded-lg border-2 border-outline-variant bg-surface-container-low transition-all peer-checked:border-secondary peer-checked:bg-secondary-fixed/20 group-hover:bg-surface-container">
<span class="material-symbols-outlined text-primary mb-2" data-icon="corporate_fare">corporate_fare</span>
<span class="text-xs font-bold text-primary">Firm</span>
</div>
</label>
</div>
</div>
<div class="grid grid-cols-1 md:grid-cols-2 gap-6">
<div class="space-y-2">
<label class="text-xs font-bold text-on-surface uppercase tracking-wider">Full Name</label>
<input class="w-full h-12 px-4 rounded-lg bg-surface-container border-outline-variant focus:border-primary focus:ring-1 focus:ring-primary transition-all text-sm" placeholder="John Doe" type="text"/>
</div>
<div class="space-y-2">
<label class="text-xs font-bold text-on-surface uppercase tracking-wider">Email Address</label>
<input class="w-full h-12 px-4 rounded-lg bg-surface-container border-outline-variant focus:border-primary focus:ring-1 focus:ring-primary transition-all text-sm" placeholder="john@logistics.pro" type="email"/>
</div>
<div class="space-y-2">
<label class="text-xs font-bold text-on-surface uppercase tracking-wider">Phone Number</label>
<input class="w-full h-12 px-4 rounded-lg bg-surface-container border-outline-variant focus:border-primary focus:ring-1 focus:ring-primary transition-all text-sm" placeholder="+1 (555) 000-0000" type="tel"/>
</div>
<div class="space-y-2">
<label class="text-xs font-bold text-on-surface uppercase tracking-wider">Password</label>
<input class="w-full h-12 px-4 rounded-lg bg-surface-container border-outline-variant focus:border-primary focus:ring-1 focus:ring-primary transition-all text-sm" placeholder="••••••••" type="password"/>
</div>
</div>
<div class="flex items-start gap-3">
<input class="mt-1 rounded border-outline-variant text-secondary focus:ring-secondary" id="terms" type="checkbox"/>
<label class="text-sm text-on-surface-variant" for="terms">
                            I agree to the <a class="text-secondary font-medium hover:underline" href="#">Terms of Service</a> and <a class="text-secondary font-medium hover:underline" href="#">Privacy Policy</a>
</label>
</div>
<button class="w-full h-14 bg-primary text-on-primary rounded-lg font-bold flex items-center justify-center gap-2 hover:bg-primary/90 active:scale-[0.98] transition-all shadow-md" type="submit">
                        Sign Up
                        <span class="material-symbols-outlined" data-icon="arrow_forward">arrow_forward</span>
</button>
</form>
</div>
<div class="bg-surface-container-low border-t border-outline-variant/30 p-6 text-center">
<p class="text-sm text-on-surface-variant">
                    Already have an account? <a class="text-secondary font-bold hover:underline" href="#">Login here</a>
</p>
</div>
</div>
</main>
<footer class="bg-[#041627] dark:bg-[#0b1d2d] text-white w-full py-12 border-t border-[#1a2b3c] flex flex-col md:flex-row justify-between items-center px-8 md:px-32 gap-4">
<div class="text-xl font-black text-[#ffa454]">LogisticsPro</div>
<div class="flex gap-6 font-['Inter'] text-xs">
<a class="text-[#8192a7] hover:text-white transition-colors" href="#">Privacy Policy</a>
<a class="text-[#8192a7] hover:text-white transition-colors" href="#">Terms of Service</a>
<a class="text-[#8192a7] hover:text-white transition-colors" href="#">Compliance</a>
<a class="text-[#8192a7] hover:text-white transition-colors" href="#">Contact</a>
</div>
<div class="text-[#8192a7] font-['Inter'] text-xs">
            © 2024 LogisticsPro Inc. All rights reserved.
        </div>
</footer>
</body></html>
