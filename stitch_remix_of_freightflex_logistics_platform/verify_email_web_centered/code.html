<body class="bg-surface min-h-screen flex items-center justify-center p-6">
<!-- Transactional Screen: Navigation shells suppressed as per UX Goal -->
<div class="max-w-[480px] w-full bg-surface-container-lowest rounded-xl shadow-[0_4px_12px_rgba(26,43,60,0.05)] overflow-hidden">
<!-- Header / Logo Area -->
<div class="px-8 pt-10 pb-6 text-center">
<div class="mb-8 flex justify-center">
<div class="w-16 h-16 bg-primary-container rounded-xl flex items-center justify-center">
<span class="material-symbols-outlined text-on-primary-container text-4xl" data-icon="mark_email_unread" style="font-variation-settings: 'FILL' 1;">mark_email_unread</span>
</div>
</div>
<h1 class="text-[32px] font-bold leading-[40px] tracking-[-0.02em] text-on-surface mb-3">
                Verify Email
            </h1>
<p class="text-on-surface-variant text-base leading-6">
                We've sent a 6-digit verification code to <span class="font-semibold text-on-surface">d.walker@logisticscore.com</span>. Please enter it below to continue.
            </p>
</div>
<!-- Verification Form -->
<div class="px-8 pb-10">
<form action="#" class="space-y-8" method="POST">
<!-- 6-digit Code Inputs -->
<div class="flex justify-between gap-2 sm:gap-4">
<input class="w-full h-14 text-center text-2xl font-bold border-outline-variant focus:border-primary focus:ring-2 focus:ring-primary-fixed rounded-lg bg-surface-container-low transition-all" maxlength="1" required="" type="text"/>
<input class="w-full h-14 text-center text-2xl font-bold border-outline-variant focus:border-primary focus:ring-2 focus:ring-primary-fixed rounded-lg bg-surface-container-low transition-all" maxlength="1" required="" type="text"/>
<input class="w-full h-14 text-center text-2xl font-bold border-outline-variant focus:border-primary focus:ring-2 focus:ring-primary-fixed rounded-lg bg-surface-container-low transition-all" maxlength="1" required="" type="text"/>
<input class="w-full h-14 text-center text-2xl font-bold border-outline-variant focus:border-primary focus:ring-2 focus:ring-primary-fixed rounded-lg bg-surface-container-low transition-all" maxlength="1" required="" type="text"/>
<input class="w-full h-14 text-center text-2xl font-bold border-outline-variant focus:border-primary focus:ring-2 focus:ring-primary-fixed rounded-lg bg-surface-container-low transition-all" maxlength="1" required="" type="text"/>
<input class="w-full h-14 text-center text-2xl font-bold border-outline-variant focus:border-primary focus:ring-2 focus:ring-primary-fixed rounded-lg bg-surface-container-low transition-all" maxlength="1" required="" type="text"/>
</div>
<div class="space-y-4">
<button class="w-full h-14 bg-secondary text-on-secondary font-bold text-lg rounded-lg shadow-sm hover:opacity-90 active:scale-[0.98] transition-all flex items-center justify-center gap-2" type="submit">
                        Verify &amp; Continue
                    </button>
<div class="text-center">
<span class="text-on-surface-variant text-sm">Didn't receive the code?</span>
<button class="text-secondary font-bold text-sm ml-1 hover:underline" type="button">
                            Resend Code
                        </button>
</div>
</div>
</form>
<!-- Support Section -->
<div class="mt-12 pt-8 border-t border-outline-variant">
<div class="flex items-center justify-between p-4 bg-surface-container-low rounded-xl">
<div class="flex items-center gap-3">
<div class="relative">
<img alt="Support" class="w-10 h-10 rounded-full object-cover" data-alt="professional support representative smiling with headset in a modern office environment soft lighting" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAX5a7mc1ng9bempZde-eyQ8JKBse8jIem3Jn5g5YRgWZhQezafu1w_tBZZlyV4i4Bs12ieGdoM06tLTnFojm0ZJF7deW9diM9faS8EnfDfjN4yT7BaEoTaTEenYRQAzmlObh9u0KUubDlrTSNHPyrONrw0OPRXriOqJ0qQYPq9HuLFb63mB-q8xvLw1dspEIYeqT88BgFB1xt65_-5VSq0bp38QnLPxMPovEyNHi28Rc8s205fjwktSI5ISGciLwICBf9hcYybaYE"/>
<span class="absolute bottom-0 right-0 w-3 h-3 bg-green-500 border-2 border-surface-container-lowest rounded-full"></span>
</div>
<div>
<p class="text-sm font-bold text-on-surface">Support is online</p>
<p class="text-xs text-on-surface-variant">Avg. response time: 2m</p>
</div>
</div>
<button class="bg-surface-container-highest px-4 py-2 rounded-lg text-xs font-bold text-on-surface hover:bg-outline-variant transition-colors">
                        Chat Now
                    </button>
</div>
</div>
</div>
<!-- Decorative Progress Bar -->
<div class="h-1.5 w-full bg-surface-container-highest">
<div class="h-full bg-secondary" style="width: 66%;"></div>
</div>
</div>
<!-- Branding Element (Optional for centered layouts) -->
<div class="fixed top-8 left-1/2 -translate-x-1/2 md:left-12 md:translate-x-0">
<div class="flex items-center gap-2">
<div class="w-8 h-8 bg-primary rounded flex items-center justify-center">
<span class="material-symbols-outlined text-white text-xl" data-icon="local_shipping">local_shipping</span>
</div>
<span class="text-xl font-bold text-primary tracking-tight">Logistics Core</span>
</div>
