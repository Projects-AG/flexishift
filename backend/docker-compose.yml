version: "3.9"

services:

  # ── FastAPI Application ──────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: freightflex_api
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_NAME=freightflex
      - DB_USER=freightflex_user
      - DB_PASSWORD=freightflex_pass
      - REDIS_URL=redis://redis:6379/0
      # ── Email — set these in your server .env to enable OTP delivery ──────────
      - GMAIL_USER=${GMAIL_USER:-}
      - GMAIL_APP_PASSWORD=${GMAIL_APP_PASSWORD:-}
      - SENDGRID_API_KEY=${SENDGRID_API_KEY:-}
      - SENDGRID_FROM_EMAIL=${SENDGRID_FROM_EMAIL:-noreply@freightflex.io}
      - EMAIL_FROM_NAME=${EMAIL_FROM_NAME:-FreightFlex}
    volumes:
      - .:/app
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - freightflex_network
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 2

  # ── MySQL 8.0 ────────────────────────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: freightflex_mysql
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: freightflex
      MYSQL_USER: freightflex_user
      MYSQL_PASSWORD: freightflex_pass
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "freightflex_user", "-pfreightflex_pass"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - freightflex_network
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --default-authentication-plugin=mysql_native_password

  # ── Redis 7 ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: freightflex_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - freightflex_network
    command: redis-server --appendonly yes

  # ── Celery Worker ─────────────────────────────────────────────────────────────
  celery_worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: freightflex_celery
    restart: unless-stopped
    env_file: .env
    environment:
      - DB_HOST=mysql
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - .:/app
    depends_on:
      - mysql
      - redis
    networks:
      - freightflex_network
    command: celery -A app.tasks.celery_app worker --loglevel=info

volumes:
  mysql_data:
  redis_data:

networks:
  freightflex_network:
    driver: bridge
